version: "3.9"

# Realistic integration test stack for ZeroClawed + OneCLI
# This stack reproduces the bugs we found manually:
# 1. Path routing 404s
# 2. Credential injection
# 3. Config file location issues
# 4. Tool calling through proxy

services:
  # Mock VaultWarden for credential storage
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: test-vaultwarden
    environment:
      - WEBSOCKET_ENABLED=false
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=test-admin-token
    volumes:
      - vault-data:/data
    ports:
      - "8888:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/api/accounts/prelogin"]
      interval: 5s
      timeout: 3s
      retries: 10

  # OneCLI credential proxy
  onecli:
    build:
      context: ../../
      dockerfile: crates/onecli-client/Dockerfile
    container_name: test-onecli
    environment:
      - ONECLI_BIND=0.0.0.0:8081
      - VAULTWARDEN_URL=http://vaultwarden:80
      - VAULTWARDEN_TOKEN=test-admin-token
    ports:
      - "8081:8081"
    depends_on:
      vaultwarden:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  # Mock LLM API that returns tool_calls
  mock-llm:
    image: python:3.11-slim
    container_name: test-mock-llm
    command: >
      sh -c "pip install flask && python - <<'PY'
import json
from flask import Flask, request, jsonify
app = Flask(__name__)
last_request = {}

@app.route('/v1/chat/completions', methods=['POST'])
def chat():
    global last_request
    data = request.get_json()
    last_request = data
    
    # Check if tools were sent (this is what we want to verify)
    has_tools = 'tools' in data
    
    response = {
        'id': 'mock-' + str(hash(str(data))),
        'object': 'chat.completion',
        'model': data.get('model', 'gpt-4'),
        'choices': [{
            'index': 0,
            'message': {
                'role': 'assistant',
                'content': None if has_tools else 'Hello!',
                'tool_calls': [{
                    'id': 'call_' + str(hash(str(data)))[:8],
                    'type': 'function',
                    'function': {
                        'name': 'web_search',
                        'arguments': json.dumps({'query': 'weather'})
                    }
                }] if has_tools else None
            },
            'finish_reason': 'tool_calls' if has_tools else 'stop'
        }]
    }
    return jsonify(response)

@app.route('/v1/models', methods=['GET'])
def models():
    return jsonify({
        'object': 'list',
        'data': [
            {'id': 'gpt-4', 'object': 'model'},
            {'id': 'gpt-3.5-turbo', 'object': 'model'}
        ]
    })

@app.route('/health', methods=['GET'])
def health():
    return jsonify({'status': 'healthy'})

@app.route('/last-request', methods=['GET'])
def get_last_request():
    return jsonify(last_request)

@app.route('/reset', methods=['POST'])
def reset():
    global last_request
    last_request = {}
    return jsonify({'ok': True})

app.run(host='0.0.0.0', port=8000)
PY"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  # ZeroClawed with test config
  zeroclawed:
    build:
      context: ../../
      dockerfile: crates/zeroclawed/Dockerfile
    container_name: test-zeroclawed
    volumes:
      - ./test-config.toml:/root/.zeroclawed/config.toml:ro
    environment:
      - RUST_LOG=debug
    ports:
      - "18792:18792"
      - "18793:18793"
    depends_on:
      onecli:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18792/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vault-data:
