# Realistic local staging smoke stack for Calciforge's model gateway.
#
# The stack intentionally avoids real provider credentials. `mock-llm` exposes
# an OpenAI-compatible `/v1` API; Calciforge proxies to it using the same HTTP
# backend path used for local OpenAI-compatible providers.

services:
  mock-llm:
    image: python:3.11-slim
    container_name: test-mock-llm
    volumes:
      - ./mock-llm.py:/app/mock-llm.py:ro
    command: ["sh", "-c", "pip install --no-cache-dir flask && python /app/mock-llm.py"]
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 3s
      timeout: 2s
      retries: 20

  calciforge:
    image: calciforge-smoke:latest
    build:
      context: ..
      dockerfile: crates/calciforge/Dockerfile
    container_name: test-calciforge
    volumes:
      - ./test-config.toml:/root/.calciforge/config.toml:ro
    environment:
      - RUST_LOG=calciforge=debug
    command: ["--config", "/root/.calciforge/config.toml", "--proxy-only"]
    ports:
      - "18792:18792"
    depends_on:
      mock-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18792/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  security-proxy:
    image: calciforge-smoke:latest
    container_name: test-security-proxy
    entrypoint: ["/usr/local/bin/security-proxy"]
    environment:
      - RUST_LOG=security_proxy=debug,adversary_detector=debug
      - SECURITY_PROXY_BIND=0.0.0.0
      - SECURITY_PROXY_PORT=8888
      - AGENT_CONFIG=/tmp/nonexistent-agents.json
    ports:
      - "18888:8888"
    depends_on:
      mock-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/health"]
      interval: 5s
      timeout: 3s
      retries: 20
