name: Calciforge Integration Tests

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build project
        run: cargo build --workspace --all-targets

      - name: Run unit tests
        run: cargo test --workspace --exclude loom-tests --lib --bins

      - name: Run integration tests
        run: cargo test --workspace --exclude loom-tests --tests -- --skip test_gateway_
        env:
          # Skip tests that require running services in CI
          SKIP_LIVE_TESTS: 1

  test-secrets:
    name: OneCLI Proxy Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build OneCLI
        run: cargo build -p secrets-client --release

      - name: Start OneCLI service
        run: |
          cargo run -p secrets-client --release &
          SECRETS_PID=$!
          echo "SECRETS_PID=$SECRETS_PID" >> $GITHUB_ENV
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8081/health > /dev/null; then
              echo "OneCLI is ready"
              break
            fi
            sleep 1
          done

      - name: Run OneCLI proxy tests
        run: cargo test -p calciforge test_proxy_ -- --nocapture
        env:
          SECRETS_URL: http://127.0.0.1:8081

      - name: Stop OneCLI service
        if: always()
        run: |
          if [ -n "$SECRETS_PID" ]; then
            kill $SECRETS_PID || true
          fi

  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  matrix-real-e2e:
    name: Real Matrix E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-matrix-real-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Calciforge with Matrix channel
        run: cargo build -p calciforge --features channel-matrix

      - name: Run real Matrix homeserver E2E
        run: python3 scripts/matrix-real-e2e.py
