name: secret-scan

on:
  pull_request:
    branches: [main]
  # Also run on pushes to main so we catch anything merged without a PR gate.
  push:
    branches: [main]
  # Manual trigger for on-demand scans.
  workflow_dispatch:

permissions:
  contents: read
  # write scope is required because GITLEAKS_ENABLE_COMMENTS posts inline
  # findings on PRs. Drop back to `read` if that env var is unset.
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PRs get enough history for gitleaks-action to inspect the PR
          # diff. Main pushes intentionally avoid a full-history scan: this
          # repository has already-triaged historical findings, and re-failing
          # every post-merge push on old commits makes the branch look broken
          # without improving the PR gate.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 2 }}

      - name: Fetch PR base for gitleaks range
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=2 origin ${{ github.event.pull_request.base.sha }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Exit non-zero if anything is found so the job fails and blocks the PR.
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_SUMMARY: true
