name: secret-scan

on:
  pull_request:
    branches: [main]
  # Also run on pushes to main so we catch anything merged without a PR gate.
  push:
    branches: [main]
  # Manual trigger for on-demand scans.
  workflow_dispatch:

permissions:
  contents: read
  # write scope is required because GITLEAKS_ENABLE_COMMENTS posts inline
  # findings on PRs. Drop back to `read` if that env var is unset.
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Scan full history on PRs so we catch anything the PR introduces,
          # no matter what base it forked from.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Exit non-zero if anything is found so the job fails and blocks the PR.
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_SUMMARY: true
