<svg xmlns="http://www.w3.org/2000/svg" width="720" height="560" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Signal text fallback selection</title>
  <desc id="desc">A Signal chat showing Calciforge model selection through text commands while native controls remain future work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="720" height="560" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="132" y="46" width="456" height="468" rx="28" fill="#ffffff"/>
  </g>
  <rect x="132" y="46" width="456" height="68" rx="28" fill="#3a76f0"/>
  <rect x="132" y="86" width="456" height="28" fill="#3a76f0"/>
  <circle cx="174" cy="81" r="18" fill="#ffffff" opacity="0.92"/>
  <text x="208" y="78" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Calciforge</text>
  <text x="208" y="98" font-family="Inter, Arial, sans-serif" font-size="12" fill="#dbeafe">Signal</text>

  <rect x="330" y="146" width="218" height="42" rx="18" fill="#dbeafe"/>
  <text x="358" y="172" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a">!model list</text>

  <rect x="172" y="214" width="376" height="190" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="196" y="244" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Available model routes</text>
  <text x="196" y="274" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">* local-qwen-kimi</text>
  <text x="196" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">  local-cloud-balanced</text>
  <text x="196" y="326" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">  cloud-coding-fallback</text>
  <text x="196" y="360" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Switch with:</text>
  <text x="282" y="360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">!model use local-qwen-kimi</text>

  <rect x="258" y="430" width="290" height="42" rx="18" fill="#dbeafe"/>
  <text x="284" y="456" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a">!agent switch builder</text>

  <text x="360" y="502" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#64748b">Signal remains text-first until native controls are proven</text>
</svg>
