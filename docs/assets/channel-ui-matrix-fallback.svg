<svg xmlns="http://www.w3.org/2000/svg" width="720" height="560" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Matrix text fallback selection</title>
  <desc id="desc">A Matrix room showing Calciforge agent and model selection as deterministic text commands for clients and bridges without reliable native controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#fafaf9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="720" height="560" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="96" y="50" width="528" height="460" rx="22" fill="#ffffff"/>
  </g>
  <rect x="96" y="50" width="528" height="64" rx="22" fill="#111827"/>
  <rect x="96" y="86" width="528" height="28" fill="#111827"/>
  <text x="128" y="86" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Matrix room</text>
  <text x="548" y="85" font-family="Inter, Arial, sans-serif" font-size="12" text-anchor="end" fill="#d1d5db">ui_mode = text</text>

  <rect x="350" y="144" width="228" height="42" rx="16" fill="#e5e7eb"/>
  <text x="378" y="170" font-family="Inter, Arial, sans-serif" font-size="15" fill="#111827">!agent list</text>

  <rect x="134" y="212" width="446" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="158" y="242" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Available agents</text>
  <text x="158" y="272" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">* research - docs and retrieval</text>
  <text x="158" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">  builder - implementation work</text>
  <text x="158" y="324" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">  reviewer - code review</text>
  <text x="158" y="358" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Switch with:</text>
  <text x="244" y="358" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#334155">!agent switch builder</text>

  <rect x="350" y="426" width="228" height="42" rx="16" fill="#e5e7eb"/>
  <text x="378" y="452" font-family="Inter, Arial, sans-serif" font-size="15" fill="#111827">!model use balanced</text>

  <text x="360" y="492" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#64748b">Portable fallback for Matrix clients and bridged apps</text>
</svg>
