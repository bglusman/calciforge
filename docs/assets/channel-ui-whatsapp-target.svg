<svg xmlns="http://www.w3.org/2000/svg" width="720" height="560" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">WhatsApp native selection target</title>
  <desc id="desc">A planned WhatsApp native list rendering for Calciforge selection, marked as requiring a backend that supports WhatsApp interactive messages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#052e16" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="720" height="560" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="132" y="46" width="456" height="468" rx="28" fill="#ffffff"/>
  </g>
  <rect x="132" y="46" width="456" height="68" rx="28" fill="#128c7e"/>
  <rect x="132" y="86" width="456" height="28" fill="#128c7e"/>
  <text x="170" y="86" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Calciforge</text>
  <text x="530" y="85" font-family="Inter, Arial, sans-serif" font-size="12" text-anchor="end" fill="#d1fae5">target</text>

  <rect x="338" y="144" width="210" height="42" rx="18" fill="#dcfce7"/>
  <text x="366" y="170" font-family="Inter, Arial, sans-serif" font-size="15" fill="#064e3b">!model list</text>

  <rect x="172" y="214" width="376" height="196" rx="18" fill="#f0fdf4"/>
  <text x="196" y="246" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#064e3b">Select a model route</text>
  <text x="196" y="276" font-family="Inter, Arial, sans-serif" font-size="14" fill="#166534">Native WhatsApp lists/buttons require</text>
  <text x="196" y="298" font-family="Inter, Arial, sans-serif" font-size="14" fill="#166534">a compatible Business API or provider.</text>
  <rect x="196" y="326" width="328" height="46" rx="11" fill="#ffffff" stroke="#86efac"/>
  <text x="218" y="355" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#15803d">Open model choices</text>
  <text x="504" y="355" font-family="Inter, Arial, sans-serif" font-size="19" text-anchor="middle" fill="#15803d">&gt;</text>

  <rect x="172" y="432" width="376" height="44" rx="13" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="360" y="460" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#475569">Current embedded WhatsApp channel uses text fallback</text>
</svg>
