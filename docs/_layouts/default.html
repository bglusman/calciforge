<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ site.description }}">
<style>
:root {
  --calci-fire: #d97706;
  --calci-fire-bright: #f59e0b;
  --calci-stone: #44403c;
  --calci-stone-soft: #78716c;
  --calci-paper: #fafaf9;
  --calci-ink: #1c1917;
  --calci-line: #e7e5e4;
  --calci-code-bg: #f5f5f4;
  --calci-code-dark: #1c1917;
}
  html { box-sizing: border-box; }
  *, *:before, *:after { box-sizing: inherit; }
  body {
    background: var(--calci-paper);
    color: var(--calci-ink);
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    max-width: 820px;
    margin: 2.5rem auto;
    padding: 0 1.2rem 4rem;
  }
  h1 {
    color: var(--calci-ink);
    font-size: 2.2rem;
    line-height: 1.12;
    margin: 0 0 1.4rem;
  }
  h2 {
    color: var(--calci-stone);
    font-size: 1.4rem;
    margin-top: 2.8rem;
    border-bottom: 1px solid var(--calci-line);
    padding-bottom: 0.4rem;
  }
  h3 { color: var(--calci-stone); font-size: 1.05rem; margin-top: 1.5rem; }
  a {
    color: var(--calci-fire);
    text-decoration: underline;
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.16em;
  }
  a:hover,
  a:focus-visible { color: #b45309; }
  a:focus-visible {
    outline: 2px solid rgba(217, 119, 6, 0.45);
    outline-offset: 2px;
    border-radius: 2px;
  }
  img { max-width: 100%; }
  ul li { margin-bottom: 0.35rem; }
  code {
    background: var(--calci-code-bg);
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    font-size: 0.92em;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  pre {
    background: var(--calci-code-dark);
    color: var(--calci-paper);
    padding: 1rem 1.2rem;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  pre code { background: transparent; padding: 0; color: inherit; font-size: inherit; }
  table { border-collapse: collapse; margin: 1rem 0; width: 100%; }
  th, td { padding: 0.45rem 0.7rem; border-bottom: 1px solid var(--calci-line); text-align: left; vertical-align: top; }
  th { background: var(--calci-code-bg); font-weight: 600; }
  .channel-ui-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1rem; margin: 1.2rem 0; }
  .channel-ui-grid figure { margin: 0; }
  .channel-ui-grid img { display: block; width: 100%; height: auto; border: 1px solid var(--calci-line); border-radius: 8px; background: var(--calci-paper); }
  .channel-ui-grid figcaption { margin-top: 0.45rem; color: var(--calci-stone-soft); font-size: 0.9rem; line-height: 1.4; }
  .muted { color: var(--calci-stone-soft); }
  hr { border: 0; border-top: 1px solid var(--calci-line); margin: 2rem 0; }
  footer {
    margin-top: 3.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--calci-line);
    font-size: 0.88rem;
    color: var(--calci-stone-soft);
  }
  footer p { margin: 0.5rem 0; }
</style>
</head>
<body>
{{ content }}
<script data-goatcounter="https://stats.calciforge.org/count"
        async src="https://stats.calciforge.org/count.js"></script>
</body>
</html>
