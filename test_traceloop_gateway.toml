[zeroclawed]
version = 2

[proxy]
enabled = true
bind = "127.0.0.1:19997"
backend_type = "traceloop"  # Use Traceloop gateway
backend_url = "http://127.0.0.1:18789"  # Not used by Traceloop
backend_api_key = "Cryptonomicon381!"  # Not used by Traceloop
timeout_seconds = 120
max_body_mb = 50
default_policy = "allow_all"

[[proxy.agents]]
id = "test"
name = "Test Agent"
allowed_models = ["*"]

# Enable debug logging
[logging]
level = "debug"
format = "json"
