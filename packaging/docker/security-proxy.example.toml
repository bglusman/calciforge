port = 8888
scan_outbound = true
scan_inbound = true
inject_credentials = true
audit_log = true

# Keep the MITM CA private key in the security-proxy volume only. The Docker
# compose file mounts CALCIFORGE_SECURITY_PROXY_DATA at /var/lib/calciforge,
# which is the proxy's default auto-generated CA location. Do not share that
# host directory with Calciforge or clashd containers.

bypass_domains = [
  "localhost",
  "127.0.0.1",
  "10.*.*.*",
  "172.16.*.*",
  "172.17.*.*",
  "172.18.*.*",
  "172.19.*.*",
  "172.20.*.*",
  "172.21.*.*",
  "172.22.*.*",
  "172.23.*.*",
  "172.24.*.*",
  "172.25.*.*",
  "172.26.*.*",
  "172.27.*.*",
  "172.28.*.*",
  "172.29.*.*",
  "172.30.*.*",
  "172.31.*.*",
  "192.168.*.*",
]
