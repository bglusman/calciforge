# Example Calciforge Configuration with ACP Support
# Copy to ~/.calciforge/config.toml and customize

[calciforge]
version = 1

# ── Security / Adversary Detection ─────────────────────────────────
[security]
profile = "balanced"  # open | balanced | hardened | paranoid
scan_outbound = false

# Optional scanner pipeline extension. Empty scanner_checks uses the local
# structural + semantic defaults.
# [[security.scanner_checks]]
# kind = "keywords"
# terms = ["wire", "urgent"]
# match_all = true
# verdict = "review"
# reason = "review urgent wire language"
#
# [[security.scanner_checks]]
# kind = "starlark"
# path = "/etc/calciforge/scanner.star"
# fail_closed = true
# max_callstack = 64

# ============================================================================
# Identity Registry - Who can use Calciforge
# ============================================================================

[[identities]]
id = "operator"
display_name = "Contributor"
aliases = [
  { channel = "signal", id = "+15555550001" },
  { channel = "telegram", id = "15555550001" },
  { channel = "matrix", id = "@user:example.com" },
]
role = "owner"

[[identities]]
id = "david"
display_name = "David"
aliases = [
  { channel = "telegram", id = "7000000002" },
]
role = "user"

# ============================================================================
# Agent Registry - ACP and Other Adapters
# ============================================================================

# Claude Code via ACP (stdio transport)
[[agents]]
id = "claude-code"
kind = "acp"
transport = "stdio"
command = "claude-code"
args = ["--adapter", "acp"]
timeout_secs = 300

[agents.registry]
display_name = "Claude Code"
description = "Anthropic's Claude Code via ACP protocol"
specialties = ["coding", "refactoring", "architecture", "debugging", "testing"]
access = ["filesystem", "git", "shell"]
primary_channels = ["signal", "telegram"]

# OpenAI Codex via official Codex CLI
[[agents]]
id = "codex"
kind = "codex-cli"
command = "codex"
model = "gpt-5.5"
args = [
    "exec",
    "--color", "never",
    "--sandbox", "read-only",
    "--ask-for-approval", "never",
    "--skip-git-repo-check",
    "-"
]
timeout_ms = 600000

[agents.registry]
display_name = "OpenAI Codex"
description = "OpenAI Codex coding agent via the official Codex CLI"
specialties = ["coding", "rust", "typescript", "python", "javascript"]
access = ["filesystem", "git"]
primary_channels = ["telegram"]

# Dirac via official Dirac CLI
[[agents]]
id = "dirac"
kind = "dirac-cli"
command = "dirac"
args = ["--yolo", "--json"]
timeout_ms = 600000

[agents.registry]
display_name = "Dirac CLI"
description = "Dirac coding agent via the official dirac-cli"
specialties = ["coding", "refactoring", "token-efficiency"]
access = ["filesystem", "git", "shell"]
primary_channels = ["telegram"]

# OpenCode via ACP (stdio transport)
[[agents]]
id = "opencode"
kind = "acp"
transport = "stdio"
command = "opencode"
args = ["--acp-mode"]
timeout_secs = 180

[agents.registry]
display_name = "OpenCode"
description = "OpenCode AI coding assistant"
specialties = ["coding", "general"]
access = ["filesystem"]

# Local ACP server via HTTP
[[agents]]
id = "local-acp"
kind = "acp"
transport = "http"
endpoint = "http://localhost:8765"
api_key = "${LOCAL_ACP_KEY}"
timeout_secs = 60

[agents.registry]
display_name = "Local ACP Server"
description = "Local ACP agent running as HTTP service"
specialties = ["custom", "experimental"]
access = ["filesystem", "network"]

# ACP agent via Unix socket
[[agents]]
id = "socket-agent"
kind = "acp"
transport = "unix"
socket_path = "/run/acp/agent.sock"
timeout_secs = 60

[agents.registry]
display_name = "Socket Agent"
description = "ACP agent via Unix domain socket"
specialties = ["system", "infrastructure"]
access = ["system"]

# ============================================================================
# Routing Rules - Who uses which agents
# ============================================================================

[[routing]]
identity = "operator"
default_agent = "claude-code"
allowed_agents = ["claude-code", "codex", "opencode", "local-acp"]

[[routing]]
identity = "david"
default_agent = "codex"
allowed_agents = ["codex", "opencode"]

# ============================================================================
# Permission Policy
# ============================================================================

[permissions]
default = "deny"

[[permissions.rules]]
identity = "operator"
effect = "allow"
capabilities = ["message", "command", "agent_switch", "calciforge_admin"]

[[permissions.rules]]
identity = "david"
effect = "allow"
capabilities = ["message", "command"]

# ============================================================================
# Channel Configuration
# ============================================================================

[[channels]]
kind = "telegram"
bot_token_file = "~/.calciforge/secrets/telegram-token"
enabled = true

[[channels]]
kind = "matrix"
homeserver = "https://matrix-client.matrix.org"
user_id = "@calciforge-bot:matrix.org"
token_file = "~/.calciforge/secrets/matrix-token"
refresh_token_file = "~/.calciforge/secrets/matrix-refresh-token"
token_ttl_seconds = 14400
enabled = true

[[channels]]
kind = "signal"
phone_number = "+15555550001"
enabled = true

# ============================================================================
# Subagent Configuration
# ============================================================================

[subagents]
blocker_escalation = true
checkin_interval_seconds = 300
max_silent_retries = 2
delegation_enabled = true

# ============================================================================
# Memory Configuration
# ============================================================================

[memory]
pre_read_hook = "embedding"
embedding_model = "local/nomic-embed-text"
embedding_top_k = 5
embedding_threshold = 0.75
post_write_hook = "heuristic"
store = "sqlite"
store_path = "~/.calciforge/memory/store.db"
